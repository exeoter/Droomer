<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Droomer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',"Segoe UI",sans-serif;background:#0e0e16;color:#d0d0d8;min-height:100vh}
    a{text-decoration:none;color:inherit}

    .topbar{position:sticky;top:0;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;background:rgba(14,14,22,0.85);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,0.06);z-index:100}
    .logo{font-weight:700;font-size:16px;color:#7aa2ff;letter-spacing:-0.3px}
    .nav{display:flex;gap:4px}
    .nav a{color:#777;font-size:13px;font-weight:500;padding:7px 14px;border-radius:8px;transition:all 0.2s}
    .nav a:hover{background:rgba(122,162,255,0.1);color:#ccc}
    .nav a.active{background:rgba(122,162,255,0.12);color:#7aa2ff}

    .hero{text-align:center;padding:60px 20px 30px}
    .hero-tagline{font-size:14px;color:#666;margin-bottom:16px}
    .dev-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:999px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:#888;font-size:11px;font-weight:500}
    .dev-badge .dot{width:6px;height:6px;border-radius:50%;background:#888;animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
    .hero-btns{display:flex;gap:10px;justify-content:center;margin-top:20px}
    .btn-themes{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:8px;background:rgba(122,162,255,0.1);border:1px solid rgba(122,162,255,0.2);color:#7aa2ff;text-decoration:none;font-size:13px;font-weight:500;transition:all 0.15s}
    .btn-themes:hover{background:rgba(122,162,255,0.18);transform:translateY(-1px)}
    .btn-discord{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:8px;background:#5865f2;color:#fff;text-decoration:none;font-size:13px;font-weight:500;transition:all 0.15s}
    .btn-discord:hover{background:#4752c4;transform:translateY(-1px)}

    .main{max-width:900px;margin:0 auto;padding:24px 20px 60px}
    .page-head{margin-bottom:20px}
    .page-head h1{font-size:22px;font-weight:700;letter-spacing:-0.5px;margin-bottom:4px}

    .controls{display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
    .search{display:flex;align-items:center;background:#1a1a28;border:1px solid rgba(255,255,255,0.06);border-radius:8px;padding:0 12px;height:36px;flex:1;max-width:360px;transition:border-color 0.2s}
    .search:focus-within{border-color:rgba(122,162,255,0.3)}
    .search i{color:#555;font-size:13px;margin-right:8px}
    .search input{background:none;border:none;outline:none;color:#ccc;font-size:13px;font-family:inherit;width:100%}
    .search input::placeholder{color:#555}

    .pills{display:flex;gap:6px;flex-wrap:wrap}
    .pill{padding:6px 14px;border-radius:999px;border:1px solid rgba(255,255,255,0.06);background:transparent;color:#666;font-size:11px;font-weight:500;cursor:pointer;transition:all 0.2s}
    .pill:hover{border-color:rgba(255,255,255,0.12);color:#aaa}
    .pill.active{background:rgba(122,162,255,0.1);border-color:rgba(122,162,255,0.25);color:#7aa2ff}

    .theme-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-bottom:20px}
    .theme-card{background:#13131c;border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:16px;cursor:pointer;transition:all 0.15s}
    .theme-card:hover{border-color:rgba(255,255,255,0.12);transform:translateY(-1px)}
    .theme-name{font-size:13px;font-weight:600;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .theme-author{font-size:11px;color:#555;margin-bottom:8px}
    .theme-tags{display:flex;gap:4px;flex-wrap:wrap}
    .theme-tags span{font-size:10px;padding:2px 8px;border-radius:999px;font-weight:500}
    .t-none{background:rgba(255,255,255,0.04);color:#555}
    .t-normal{background:rgba(122,162,255,0.1);color:#7aa2ff}
    .t-feature{background:rgba(168,85,247,0.1);color:#a855f7}
    .t-epic{background:rgba(234,179,8,0.1);color:#eab308}
    .t-legendary{background:rgba(239,68,68,0.1);color:#ef4444}
    .t-mythic{background:rgba(34,197,94,0.1);color:#22c55e}

    .pagination{display:flex;justify-content:center;gap:6px}
    .pagination button{padding:8px 14px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);background:#13131c;color:#666;font-size:12px;cursor:pointer;transition:all 0.15s}
    .pagination button:hover{border-color:rgba(255,255,255,0.12);color:#aaa}
    .pagination button.active{background:rgba(122,162,255,0.1);border-color:rgba(122,162,255,0.25);color:#7aa2ff}
    .pagination button:disabled{opacity:0.3;cursor:not-allowed}

    .empty{text-align:center;padding:60px 0;color:#555;font-size:13px}

    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;z-index:100}
    .modal-overlay.show{display:flex}
    .modal{background:#13131c;border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:24px;max-width:600px;width:90%;max-height:80vh;overflow-y:auto}
    .modal h3{font-size:16px;margin-bottom:4px}
    .modal .meta{font-size:11px;color:#555;margin-bottom:16px}
    .modal pre{background:#0e0e16;border:1px solid rgba(255,255,255,0.06);border-radius:8px;padding:14px;font-family:'JetBrains Mono',monospace;font-size:11px;color:#999;overflow-x:auto;white-space:pre;max-height:300px;overflow-y:auto}
    .modal-actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
    .modal-actions button{padding:8px 16px;border-radius:8px;border:none;font-size:12px;font-weight:500;cursor:pointer;transition:all 0.15s;font-family:inherit}
    .btn-close{background:#1a1a28;color:#666}
    .btn-close:hover{background:#22223a;color:#aaa}
  </style>
</head>
<body>
  <div class="topbar">
    <div class="logo">Droomer</div>
    <div class="nav">
      <a href="/">Home</a>
      <a href="/themes" class="active">Themes</a>
    </div>
  </div>

  <div class="hero">
    <div class="hero-tagline">Droomer the Best executor.</div>
    <div class="dev-badge"><span class="dot"></span> Droomer is in Development.</div>
    <div class="hero-btns">
      <a class="btn-themes" href="/themes"><i class="fa-solid fa-palette"></i> Themes</a>
      <a class="btn-discord" href="https://discord.gg/droomer" target="_blank"><i class="fa-brands fa-discord"></i> Join Discord</a>
    </div>
  </div>

  <div class="main">
  </div>

  <script>
  </script>
</body>
</html>
